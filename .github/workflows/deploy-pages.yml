name: Deploy Demos to GitHub Pages

# Builds the standalone "Babylon.lite demos" showcase (scripts/build-pages-site.ts)
# and publishes pages-dist/ to GitHub Pages.
#
# Repo setting required once: Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
    push:
        branches: [main]
        paths:
            - "pages/**"
            - "demos-config.json"
            - "lab/demo-*.html"
            - "lab/src/demos/**"
            - "scripts/build-pages-site.ts"
            - "scripts/bundle-demos-core.ts"
            - "scripts/bundle-scenes-core.ts"
            - ".github/workflows/deploy-pages.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Fetch Freedoom IWAD (DOOM demo data)
              run: pnpm fetch:freedoom

            - name: Build Pages site
              run: pnpm build:pages-site

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: pages-dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
