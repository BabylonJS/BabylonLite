# Azure Pipelines — Babylon Lite Compat-Layer Weekly Sync
#
# Runs the `update-compat-layer` Copilot skill on a schedule, then opens a PR with
# whatever it changed under `packages/babylon-lite-compat/`.
#
# Two halves:
#   1. Agent step — runs the GitHub Copilot CLI headlessly, pointed at the skill,
#      to reconcile the compat layer with the latest Babylon.js + Babylon Lite
#      changes (implement newly-possible wrappers, add tests, bump the synced SHA).
#   2. PR driver  — `scripts/open-compat-sync-pr.ts` re-validates independently,
#      then (if the agent produced changes) branches, commits, pushes, and opens a
#      PR. Validation failures open the PR as a DRAFT rather than blocking it.
#
# Secrets / variable group (BabylonJS-Deployment is reused for the bot PAT):
#   - GITHUB_TOKEN       PAT with contents:write + pull_requests:write (BabylonBot)
#   - COPILOT_CLI_TOKEN  token the Copilot CLI authenticates with (agent runtime)
#
# The schedule is weekly; manual runs are available via "Run pipeline".

trigger: none
pr: none

schedules:
    - cron: "0 9 * * 1"
      displayName: "Weekly compat-layer sync"
      branches:
          include:
              - master
      always: true

parameters:
    - name: dryRun
      displayName: "Dry run (no push / no PR)"
      type: boolean
      default: false

variables:
    - group: BabylonJS-Deployment
    - name: NODE_VERSION
      value: "22.x"
    - name: PNPM_VERSION
      value: "9.15.4"
    - name: CI
      value: "true"

stages:
    - stage: CompatSync
      displayName: "Compat-Layer Weekly Sync"
      jobs:
          - job: SyncAndOpenPr
            displayName: "Sync compat layer and open PR"
            timeoutInMinutes: 60
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0
                  fetchTags: true
                  persistCredentials: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                # ── Agent step ────────────────────────────────────────────────
                # Runs the update-compat-layer skill headlessly. The skill reads
                # the last-synced SHA from COMPAT-STATUS.md, diffs BJS master and
                # Lite since then, implements what is now possible, adds tests, and
                # updates the status file. Swap the CLI invocation for whatever
                # agent runtime is standard (GitHub Copilot CLI shown here).
                - script: |
                      set -euo pipefail
                      npm install -g @github/copilot
                      copilot --allow-all-tools --prompt "Follow the instructions in .github/copilot/skills/update-compat-layer.md to reconcile the compat layer against the latest Babylon.js and Babylon Lite changes. Implement what is newly possible, add GPU-free tests, and update COMPAT-STATUS.md including the synced commit SHA and date."
                  displayName: "Run update-compat-layer skill"
                  env:
                      GITHUB_TOKEN: $(GITHUB_TOKEN)
                      COPILOT_CLI_TOKEN: $(COPILOT_CLI_TOKEN)

                # ── Deterministic PR driver ───────────────────────────────────
                # Independently re-validates, then branches/commits/pushes/opens a
                # PR only when the agent actually changed something.
                - script: npx tsx scripts/open-compat-sync-pr.ts
                  displayName: "Validate and open compat-sync PR"
                  env:
                      GITHUB_REPOSITORY: "BabylonJS/Babylon-Lite"
                      GITHUB_TOKEN: $(GITHUB_TOKEN)
                      BASE_BRANCH: "master"
                      DRY_RUN: ${{ lower(parameters.dryRun) }}
