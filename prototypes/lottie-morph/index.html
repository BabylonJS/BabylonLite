<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lottie Morph — Babylon Lite prototype</title>
        <style>
            :root {
                color-scheme: dark;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                font-family: system-ui, sans-serif;
                background: #1b1b1f;
                color: #e6e6e6;
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            #stage {
                position: relative;
                flex: 1;
                display: grid;
                place-items: center;
                overflow: hidden;
            }
            /* Background swatches behind the (transparent) canvas so we can judge alpha. */
            #stage[data-bg="checker"] {
                background-color: #2a2a2e;
                background-image:
                    linear-gradient(45deg, #232327 25%, transparent 25%), linear-gradient(-45deg, #232327 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #232327 75%), linear-gradient(-45deg, transparent 75%, #232327 75%);
                background-size: 24px 24px;
                background-position:
                    0 0,
                    0 12px,
                    12px -12px,
                    -12px 0;
            }
            #stage[data-bg="light"] {
                background: #f3f3f3;
            }
            #stage[data-bg="white"] {
                background: #ffffff;
            }
            #stage[data-bg="dark"] {
                background: #1b1b1f;
            }
            #stage[data-bg="fre-dark"] {
                background: #1f1f1f; /* RGB (31,31,31) — the "Dark Mask" fill color */
            }
            canvas {
                width: min(90vmin, 720px);
                height: min(90vmin, 720px);
                display: block;
            }
            #bar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 16px;
                background: #111114;
                border-top: 1px solid #2c2c32;
                font-size: 13px;
            }
            #bar button {
                background: #6264a7;
                color: #fff;
                border: 0;
                border-radius: 6px;
                padding: 6px 14px;
                font-size: 13px;
                cursor: pointer;
            }
            #bar button:hover {
                background: #7376c2;
            }
            #scrub {
                flex: 1;
                accent-color: #6264a7;
            }
            #bar label {
                opacity: 0.8;
            }
            #stat {
                font-variant-numeric: tabular-nums;
                opacity: 0.7;
                min-width: 150px;
            }
            select {
                background: #1b1b1f;
                color: #e6e6e6;
                border: 1px solid #2c2c32;
                border-radius: 6px;
                padding: 5px 8px;
            }
            #err {
                position: absolute;
                inset: 0;
                display: none;
                place-items: center;
                padding: 24px;
                text-align: center;
                color: #ff9a9a;
                font-size: 14px;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="stage" data-bg="checker">
                <canvas id="c"></canvas>
                <div id="err"></div>
            </div>
            <div id="bar">
                <button id="play">Pause</button>
                <input id="scrub" type="range" min="0" max="110" step="0.1" value="0" />
                <span id="stat">frame 0 / 110</span>
                <label
                    >file
                    <select id="file">
                        <option value="teams.json">teams (shapes)</option>
                        <option value="fluent.json">fluent (images)</option>
                        <option value="fre.json">fre (shapes+text)</option>
                        <option value="fre-dark.json">fre dark (fake mask)</option>
                        <option value="fre-hc.json">fre HC (high contrast)</option>
                        <option value="edu.json">edu (text+parenting)</option>
                        <option value="pages.json">pages (complex)</option>
                    </select>
                </label>
                <label
                    >bg
                    <select id="bg">
                        <option value="checker">checker</option>
                        <option value="dark">dark</option>
                        <option value="fre-dark">fre dark (31,31,31)</option>
                        <option value="light">light</option>
                        <option value="white">white</option>
                    </select>
                </label>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
