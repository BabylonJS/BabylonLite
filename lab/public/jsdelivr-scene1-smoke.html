<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon Lite jsDelivr Smoke Test (Scene1)</title>
    <script>
        (() => {
            const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
            const theme = param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <style>
        :root {
            color-scheme: light;
            --cp-bg: #f7f4ef;
            --cp-bg-elevated: #fcfbf8;
            --cp-surface: #ffffff;
            --cp-surface-soft: #f5f5f5;
            --cp-border: #dedede;
            --cp-border-strong: #919191;
            --cp-text: #242424;
            --cp-text-muted: #5c5c5c;
            --cp-text-soft: #6f6f6f;
            --cp-accent: #b11f4b;
            --cp-accent-hover: #9a1a41;
            --cp-accent-soft: rgba(177, 31, 75, 0.08);
            --cp-accent-fg: #ffffff;
            --cp-success: #16a34a;
            --cp-danger: #dc2626;
            --cp-warning: #f59e0b;
            --cp-link: #0078d4;
            --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
            --cp-overlay: rgba(255, 255, 255, 0.8);
            --cp-panel: rgba(255, 255, 255, 0.86);
            --cp-panel-strong: rgba(255, 255, 255, 0.96);
            --cp-sheen: rgba(255, 255, 255, 0.55);
            --cp-highlight: rgba(177, 31, 75, 0.12);
        }
        html[data-theme="dark"] {
            color-scheme: dark;
            --cp-bg: #3d3b3a;
            --cp-bg-elevated: #343231;
            --cp-surface: #292929;
            --cp-surface-soft: #2e2e2e;
            --cp-border: #474747;
            --cp-border-strong: #5f5f5f;
            --cp-text: #dedede;
            --cp-text-muted: #919191;
            --cp-text-soft: #b0b0b0;
            --cp-accent: #fd8ea1;
            --cp-accent-hover: #fb7b91;
            --cp-accent-soft: rgba(253, 142, 161, 0.14);
            --cp-accent-fg: #1a1a1a;
            --cp-success: #4ade80;
            --cp-danger: #f87171;
            --cp-warning: #fbbf24;
            --cp-link: #4da6ff;
            --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
            --cp-overlay: rgba(41, 41, 41, 0.88);
            --cp-panel: rgba(41, 41, 41, 0.72);
            --cp-panel-strong: rgba(41, 41, 41, 0.96);
            --cp-sheen: rgba(255, 255, 255, 0.04);
            --cp-highlight: rgba(253, 142, 161, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cp-bg);
            color: var(--cp-text);
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            border-radius: 16px;
            border: 1px solid var(--cp-border);
            background: var(--cp-surface);
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.14);
        }

        .header {
            padding: 12px 16px;
        }

        .title {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--cp-text-muted);
            font-size: 0.875rem;
        }

        .content {
            margin-top: 12px;
            padding: 12px;
        }

        #renderCanvas {
            width: 100%;
            height: min(72vh, 780px);
            display: block;
            border-radius: 0.625rem;
            border: 1px solid var(--cp-border);
            background: var(--cp-bg-elevated);
        }

        #status {
            margin-top: 8px;
            font-size: 0.875rem;
            color: var(--cp-text-muted);
        }

        #status.success {
            color: var(--cp-success);
        }

        #status.error {
            color: var(--cp-danger);
        }

        code {
            font-family: Consolas, "Courier New", Courier, monospace;
            background: var(--cp-surface-soft);
            border: 1px solid var(--cp-border);
            border-radius: 0.625rem;
            padding: 2px 6px;
        }

        a {
            color: var(--cp-link);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="header">
                <h1 class="title">Babylon Lite jsDelivr Smoke Test (BoomBox)</h1>
                <p class="subtitle">
                    Imports <code>@babylonjs/lite@1.4.0</code> from jsDelivr and loads the classic BoomBox glTF.
                </p>
            </div>
            <div class="content">
                <canvas id="renderCanvas"></canvas>
                <div id="status">Starting…</div>
                <p class="subtitle">
                    CDN URL:
                    <a href="https://cdn.jsdelivr.net/npm/@babylonjs/lite@1.4.0" target="_blank" rel="noreferrer">
                        https://cdn.jsdelivr.net/npm/@babylonjs/lite@1.4.0
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            addToScene,
            attachControl,
            createDefaultCamera,
            createEngine,
            createHemisphericLight,
            createSceneContext,
            loadGltf,
            registerScene,
            startEngine,
        } from "https://cdn.jsdelivr.net/npm/@babylonjs/lite@1.4.0";

        const canvas = document.getElementById("renderCanvas");
        const status = document.getElementById("status");

        function setStatus(text, cls = "") {
            status.textContent = text;
            status.className = cls;
        }

        async function main() {
            setStatus("Creating engine...");
            const engine = await createEngine(canvas);
            const scene = createSceneContext(engine);

            setStatus("Loading BoomBox glTF...");
            addToScene(scene, await loadGltf(engine, "https://playground.babylonjs.com/scenes/BoomBox.glb"));
            addToScene(scene, createHemisphericLight([0, 1, 0], 1));

            const camera = createDefaultCamera(scene);
            camera.alpha = 1.77538207638442;
            attachControl(camera, canvas, scene);

            setStatus("Registering scene...");
            await registerScene(scene);
            await startEngine(engine);

            setStatus("Ready: BoomBox rendered from jsDelivr package.", "success");
        }

        main().catch((error) => {
            console.error(error);
            setStatus(`Failed: ${error?.message ?? String(error)}`, "error");
        });
    </script>
</body>
</html>
