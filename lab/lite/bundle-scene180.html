<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Babylon Lite - Scene 180: TextRenderer (Bundle)</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #0d1117;
            }
            canvas {
                width: 100%;
                height: 100%;
                display: block;
            }
            #panel {
                position: absolute;
                top: 16px;
                left: 16px;
                z-index: 10;
            }
            #textInput {
                width: 280px;
                height: 140px;
            }
        </style>
    </head>
    <body>
        <canvas id="renderCanvas"></canvas>
        <div id="panel">
            <textarea id="textInput" spellcheck="false">Hello, TextRenderer!</textarea>
            <input id="rot" type="range" min="-180" max="180" step="1" value="0" />
            <span class="val" id="rotVal">0°</span>
            <input id="opacity" type="range" min="0" max="1" step="0.01" value="1" />
            <span class="val" id="opacityVal">1.00</span>
            <input id="red" type="range" min="0" max="1" step="0.01" value="1" />
            <span class="val" id="redVal">1.00</span>
            <input id="green" type="range" min="0" max="1" step="0.01" value="1" />
            <span class="val" id="greenVal">1.00</span>
            <input id="blue" type="range" min="0" max="1" step="0.01" value="1" />
            <span class="val" id="blueVal">1.00</span>
        </div>
        <script src="/loader.js"></script>
        <script type="module" src="/lite/bundle/scene180.js"></script>
    </body>
</html>
