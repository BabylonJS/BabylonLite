<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Babylon Lite — Scene 181 — Live Text Editor</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #0d1117;
            }
            canvas {
                width: 100%;
                height: 100%;
                display: block;
            }
            textarea {
                position: absolute;
                top: 16px;
                left: 16px;
                width: 320px;
                height: 120px;
                z-index: 10;
                background: rgba(13, 17, 23, 0.85);
                color: #e6edf3;
                border: 1px solid #30363d;
                border-radius: 6px;
                padding: 8px;
                font: 14px/1.4 monospace;
                resize: vertical;
            }
        </style>
    </head>
    <body>
        <canvas id="renderCanvas"></canvas>
        <textarea id="textInput" spellcheck="false">Type here...</textarea>
        <script type="module" src="/lite/src/lite/scene181.ts"></script>
    </body>
</html>
