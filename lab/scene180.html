<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Babylon Lite — Scene 180 — TextRenderer (2D)</title>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #0d1117;
                color: #e6edf3;
                font: 13px/1.4 system-ui, sans-serif;
            }
            canvas {
                width: 100%;
                height: 100%;
                display: block;
                cursor: grab;
            }
            canvas.dragging {
                cursor: grabbing;
            }
            #panel {
                position: absolute;
                top: 16px;
                left: 16px;
                z-index: 10;
                background: rgba(13, 17, 23, 0.88);
                border: 1px solid #30363d;
                border-radius: 6px;
                padding: 10px 12px;
                display: flex;
                flex-direction: row;
                gap: 12px;
                align-items: stretch;
            }
            #textInput {
                width: 280px;
                height: 140px;
                background: #0d1117;
                color: #e6edf3;
                border: 1px solid #30363d;
                border-radius: 4px;
                padding: 6px;
                font: 13px/1.4 monospace;
                resize: vertical;
                box-sizing: border-box;
            }
            #sliders {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 240px;
                justify-content: center;
            }
            .row {
                display: grid;
                grid-template-columns: 70px 1fr 48px;
                align-items: center;
                gap: 8px;
            }
            .row label {
                color: #9aa4b2;
            }
            .row input[type="range"] {
                width: 100%;
            }
            .row .val {
                text-align: right;
                font-variant-numeric: tabular-nums;
                color: #c9d1d9;
            }
            #hint {
                font-size: 11px;
                color: #6e7681;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <canvas id="renderCanvas"></canvas>
        <div id="panel">
            <textarea id="textInput" spellcheck="false">Hello, TextRenderer!
No scene. No camera.
Just pixels.</textarea>
            <div id="sliders">
                <div class="row">
                    <label for="rot">Rotation</label>
                    <input id="rot" type="range" min="-180" max="180" step="1" value="0" />
                    <span class="val" id="rotVal">0°</span>
                </div>
                <div class="row">
                    <label for="opacity">Opacity</label>
                    <input id="opacity" type="range" min="0" max="1" step="0.01" value="1" />
                    <span class="val" id="opacityVal">1.00</span>
                </div>
                <div id="hint">
                    Drag canvas to move<br />
                    Scroll wheel to scale
                </div>
            </div>
        </div>
        <script type="module" src="/src/lite/scene180.ts"></script>
    </body>
</html>
