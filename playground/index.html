<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Babylon Lite Playground</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <div id="app">
            <header class="toolbar">
                <div class="brand">Babylon <span>Lite</span> Playground</div>
                <div class="actions">
                    <select id="examples" class="select" title="Load an example" aria-label="Examples"></select>
                    <button id="formatBtn" class="btn" title="Format (Shift+Alt+F)">Format</button>
                    <div class="save-group">
                        <button id="saveBtn" class="btn" title="Save &amp; copy link">Save</button>
                        <button id="saveDetailsBtn" class="btn btn-caret" title="Save with details…" aria-label="Save with details">▾</button>
                    </div>
                    <button id="runBtn" class="btn btn-primary" title="Run (Ctrl/Cmd+Enter)">▶ Run</button>
                    <a id="openFullBtn" class="btn" href="#" title="Open this code in the full Lite Playground">Open in Lite Playground ↗</a>
                </div>
            </header>
            <main class="split">
                <section class="pane pane-editor">
                    <div id="editor"></div>
                </section>
                <section class="pane pane-preview">
                    <div class="preview-host" id="previewHost"></div>
                    <div class="console" id="console" aria-live="polite"></div>
                </section>
            </main>
        </div>
        <dialog id="saveDialog" class="dialog">
            <form method="dialog" class="dialog-form">
                <h2>Save snippet</h2>
                <label class="field">
                    <span>Title</span>
                    <input id="snippetName" type="text" autocomplete="off" placeholder="My Lite scene" />
                </label>
                <label class="field">
                    <span>Description</span>
                    <textarea id="snippetDescription" rows="3" placeholder="What does this show?"></textarea>
                </label>
                <label class="field">
                    <span>Tags</span>
                    <input id="snippetTags" type="text" autocomplete="off" placeholder="comma, separated" />
                </label>
                <div class="dialog-actions">
                    <button type="button" id="saveDialogCancel" class="btn">Cancel</button>
                    <button type="submit" id="saveDialogConfirm" class="btn btn-primary">Save &amp; copy link</button>
                </div>
            </form>
        </dialog>
        <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
